<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none" />
    <title>StockFlow Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Configure Tailwind to use class-based dark mode
      tailwind.config = {
        darkMode: 'class'
      };
      
      // Apply theme immediately before React loads to prevent flickering
      // This is a simple version - AppContext will handle the full initialization
      (function() {
        try {
          // We can't know the exact org ID here easily without logic, 
          // but we can look for any appSettings_* key or just default to dark
          const keys = Object.keys(localStorage);
          const settingsKey = keys.find(k => k.startsWith('appSettings_'));
          if (settingsKey) {
            const settings = JSON.parse(localStorage.getItem(settingsKey));
            if (settings && settings.theme) {
              document.documentElement.classList.add(settings.theme);
              if (settings.theme === 'dark') {
                document.body.classList.add('bg-gray-900');
              }
            }
          } else {
            // Default to dark if no settings found
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

{

  }
}
</script>
